<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Transaction Details</title>
<style>
  /* Loader Styles */
  #loader {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #000;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    font-family: Arial, sans-serif;
    z-index: 9999;
  }

  /* Main Page Styles */
  #mainContent {
    display: none;
    background-color: #000;
    color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
    max-width: 400px;
    margin: 0 auto;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    font-size: 1.1rem;
    padding-bottom: 15px;
  }

  .top-bar .left-time {
    font-weight: 600;
    font-family: 'SF Pro Text', 'Arial', sans-serif;
  }

  .top-bar .right-status {
    display: flex;
    gap: 6px;
    align-items: center;
    font-weight: 600;
    font-family: 'SF Pro Text', 'Arial', sans-serif;
  }

  .signal-dots {
    display: flex;
    gap: 3px;
  }

  .signal-dot {
    width: 4px;
    height: 4px;
    background: #ccc;
    border-radius: 50%;
  }

  .signal-dot.active {
    background: white;
  }

  .icon-link {
    font-weight: 700;
    background: #ffc700;
    padding: 2px 8px;
    border-radius: 8px;
    font-family: 'Arial Black', Arial, sans-serif;
    color: #000;
    margin-left: 6px;
  }

  .close-icon {
    font-weight: 700;
    font-size: 2rem;
    cursor: pointer;
    line-height: 1;
    margin-bottom: 25px;
  }

  .profile-section {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 8px;
  }

  .profile-section img {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
  }

  .profile-info {
    flex-grow: 1;
  }

  .profile-name {
    font-size: 2rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .profile-name .green-lock {
    width: 18px;
    height: 18px;
    background-color: #00ff00;
    border-radius: 4px;
    display: inline-block;
    position: relative;
  }

  .green-lock::before {
    content: "🔒";
    font-size: 14px;
    position: absolute;
    top: 1px;
    left: 3px;
    color: #006400;
  }

  .date-time {
    color: #666;
    font-weight: 500;
    font-size: 1rem;
  }

  .for-text {
    color: #666;
    font-weight: 500;
    font-size: 1.1rem;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .for-text .red-heart {
    font-size: 1.2rem;
    color: red;
  }

  .amount {
    font-size: 3rem;
    font-weight: 700;
    margin: 20px 0 20px;
  }

  hr {
    border: 0.5px solid #222;
    margin-bottom: 20px;
  }

  .transaction-details-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .transaction-detail {
    margin-bottom: 20px;
  }

  .transaction-detail-header {
    display: flex;
    align-items: center;
    font-weight: 700;
    font-size: 1.1rem;
    gap: 10px;
  }

  .transaction-detail-header svg {
    fill: white;
  }

  .transaction-detail-description {
    color: #666;
    margin-left: 26px;
    margin-top: 4px;
    font-weight: 400;
    font-size: 0.95rem;
  }

  .transaction-detail-description strong {
    font-weight: 700;
  }

  .copy-icon {
    cursor: pointer;
    margin-left: auto;
    width: 20px;
    height: 20px;
    stroke: white;
    stroke-width: 1.5;
  }

  /* Bottom line */
  .bottom-line {
    width: 50%;
    height: 4px;
    background: #444;
    border-radius: 10px;
    margin: 0 auto;
    margin-top: 30px;
  }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">Loading...</div>

<!-- Main Content -->
<div id="mainContent" role="main" aria-label="Transaction Details">

  <button class="close-icon" aria-label="Close page" onclick="alert('Close clicked')">✕</button>

  <div class="profile-section">
    <img src="https://images.unsplash.com/photo-1558788353-f76d92427f16?auto=format&fit=crop&w=72&q=80" alt="Profile picture of a dog" />
  </div>

  <div class="profile-info">
    <div class="profile-name">
      OnTop <span class="green-lock" aria-label="Secure"></span>
    </div>
    <div class="date-time" aria-label="Date and time">Jan 17 at 3:09 AM</div>
    <div class="for-text">For <span class="red-heart" aria-label="Heart emoji">❤️</span></div>
  </div>

  <div class="amount" aria-label="Payment amount">$1.00</div>

  <hr />

  <div class="transaction-details-title">Transaction details</div>

  <div class="transaction-detail" aria-label="Transaction status">
    <div class="transaction-detail-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Complete
    </div>
    <div class="transaction-detail-description">Payment sent successfully</div>
  </div>

  <div class="transaction-detail" aria-label="Payment details">
    <div class="transaction-detail-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 0 0-3-3.87M4 7v6a4 4 0 0 0 3 3.87"/></svg>
      Payment between
    </div>
    <div class="transaction-detail-description">
      To: <strong>OnTop</strong><br/>
      From: Kyungah Kim
    </div>
  </div>

  <div class="transaction-detail" aria-label="Payment source">
    <div class="transaction-detail-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><text x="2" y="18" fill="white" font-weight="700" font-size="18">$</text></svg>
      Payment source
    </div>
    <div class="transaction-detail-description">STRIDE BANK NA</div>
  </div>

  <div class="transaction-detail" aria-label="Transaction number">
    <div class="transaction-detail-header">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><text x="2" y="18" fill="white" font-weight="700" font-size="18">#</text></svg>
      Transaction number
      <svg class="copy-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="Copy transaction number" role="button" tabindex="0" onclick="copyTransactionNumber()">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </div>
    <div class="transaction-detail-description" id="transactionNumberText">#D-5KEMXK6D</div>
  </div>

  <div class="bottom-line" aria-hidden="true"></div>
</div>

<script>
  // Show loader for 5 seconds then display main content
  window.onload = function() {
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';
    }, 5000);
  };

  // Copy transaction number to clipboard
  function copyTransactionNumber() {
    const text = document.getElementById('transactionNumberText').textContent.trim();
    navigator.clipboard.writeText(text)
      .then(() => {
        alert('Transaction number copied!');
      })
      .catch(() => {
        alert('Failed to copy.');
      });
  }
</script>

</body>
</html>
