<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Payment Replica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
  body, html {
    margin: 0;
    padding:0;
    background-color: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .status-bar {
    padding: 4px 15px;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-bar .time {
    font-weight: 600;
  }
  /* Battery & signal mimics */
  .status-bar .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  /* Container for payment screen */
  .container {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 15px 0 15px;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    font-size: 18px;
    border-bottom: 1px solid #222;
    padding-bottom: 6px;
  }
  .top-bar .close {
    font-size: 25px;
    cursor: pointer;
    line-height: 1;
    user-select: none;
    color: #fff;
  }
  .top-bar .pay-btn {
    background-color: #555;
    color: #888;
    font-weight: 600;
    font-size: 15px;
    border: none;
    border-radius: 22px;
    padding: 9px 24px;
    cursor: not-allowed;
    opacity: 0.5;
  }
  .top-bar .pay-btn.enabled {
    background-color: #0a84ff;
    color: #fff;
    cursor: pointer;
    opacity: 1;
  }
  /* Input lines */
  .input-group {
    margin-top: 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid #222;
  }
  .input-label {
    font-weight: 600;
    margin-bottom: 5px;
    font-size: 15px;
  }
  input[type=text], input[type=email], textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    color: #ccc;
    padding: 5px 0;
    font-weight: 400;
    caret-color: #0a84ff;
  }
  input::placeholder, textarea::placeholder {
    color: #555;
  }
  /* Use line with icon */
  .use-group {
    margin-top: 15px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    padding-bottom: 12px;
    gap: 8px;
  }
  .use-label {
    font-weight: 600;
    font-size: 15px;
    min-width: 42px;
  }
  .card-icon {
    width: 32px;
    height: 32px;
    background: white;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .card-icon img {
    width: 22px;
    height: 22px;
  }
  .card-text {
    font-size: 15px;
    color: #ccc;
    flex-grow: 1;
  }
  .dropdown-arrow {
    border: solid #666;
    border-width: 0 2px 2px 0;
    display: inline-block;
    padding: 4px;
    transform: rotate(45deg);
    -webkit-transform: rotate(45deg);
    cursor: pointer;
  }
  /* Section Titles */
  .section-title {
    font-weight: 700;
    font-size: 20px;
    margin-top: 24px;
    margin-bottom: 14px;
  }
  /* Suggested list */
  .suggested-list, .contacts-list {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .contact-item {
    display: flex;
    align-items: center;
  }
  .contact-img {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    object-fit: cover;
  }
  .contact-info {
    margin-left: 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .contact-name {
    display: flex;
    align-items: center;
    font-weight: 600;
    font-size: 16px;
  }
  .business-icon {
    background-color: #00e409;
    width: 18px;
    height: 18px;
    border-radius: 4px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-left: 6px;
  }
  .business-icon svg {
    width: 12px;
    height: 12px;
    fill: #000;
  }
  .contact-cashtag {
    font-size: 14px;
    color: #ccc;
  }
  /* Circle radio buttons on right */
  .contact-radio {
    margin-left: auto;
    border: 2px solid #555;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    position: relative;
    cursor: pointer;
  }
  .contact-radio input {
    opacity: 0;
    position: absolute;
    width: 0;
    height: 0;
  }
  .contact-radio input:checked + .checkmark {
    border-color: #0a84ff;
    background-color: #0a84ff;
  }
  .checkmark {
    position: absolute;
    top: 1.5px;
    left: 1.5px;
    height: 15px;
    width: 15px;
    border-radius: 50%;
    border: 2px solid #555;
  }
  /* Keyboard mimic */
  .keyboard {
    background-color: #222;
    padding: 8px 10px;
    margin-top: auto;
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    user-select: none;
  }
  .key {
    background-color: #555;
    border-radius: 7px;
    height: 42px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 17px;
    color: #ccc;
    cursor: default;
    user-select: none;
  }
  .key.wide {
    grid-column: span 2;
  }
  /* Smile and mic icon style */
  .icon-button {
    font-size: 28px;
    cursor: pointer;
    user-select: none;
    color: #888;
  }
  /* Receipt container */
  #receipt {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translate(-50%,0);
    background: #111;
    width: 320px;
    max-width: 90vw;
    border-radius: 12px;
    box-shadow: 0 0 12px #0a84ffaa;
    padding: 20px 24px 20px 24px;
    color: #eee;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    display: none;
    z-index: 1000;
  }
  #receipt h2 {
    margin-top: 0;
    font-weight: 700;
    font-size: 20px;
    text-align: center;
    margin-bottom: 12px;
  }
  #receipt p {
    margin: 6px 0;
  }
  #receipt .close-receipt {
    background: none;
    border: none;
    color: #0a84ff;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    margin-top: 12px;
    display: block;
    margin-left: auto;
  }
  /* Editable input color */
  input:focus, textarea:focus {
    border-bottom: 1px solid #0a84ff;
    color: white;
    outline-offset: 2px;
  }
</style>
</head>
<body>
  <div class="container" role="main" aria-label="Payment screen">
    <div class="top-bar">
      <div class="close" id="closeBtn" aria-label="Close">&times;</div>
      <div id="amountHeader" aria-live="polite" aria-atomic="true">$2,000</div>
      <button class="pay-btn" id="payBtn" aria-disabled="true" disabled>Pay</button>
    </div>

    <div class="input-group" style="margin-top:14px;">
      <label for="toInput" class="input-label">To</label>
      <input type="text" id="toInput" placeholder="Name, $Cashtag, Phone, Email" aria-required="true" />
    </div>

    <div class="input-group">
      <label for="forInput" class="input-label">For</label>
      <input type="text" id="forInput" placeholder="Note (required)" aria-required="true" />
    </div>

    <div class="use-group" aria-label="Payment method">
      <div class="use-label">Use</div>
      <div class="card-icon" aria-hidden="true" title="Stride logo">
        <svg width="22" height="22" viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;">
          <rect width="35" height="35" rx="7" fill="#000" />
          <path d="M20.8 18.8h-3.2l-3.6 6h-3.6l5.6-9.6-5.6-9.6h3.6l3.6 6H20.8l-5.6 9.6z" fill="#D92525" />
        </svg>
      </div>
      <div class="card-text" aria-live="polite" aria-atomic="true">Visa debit card 9172</div>
      <div class="dropdown-arrow" aria-hidden="true"></div>
    </div>

    <div class="section-title">Suggested</div>
    <div class="suggested-list" role="list">
      <div class="contact-item" role="listitem">
        <img src="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?crop=faces&fit=crop&w=42&h=42" alt="Suggested contact OnTop" class="contact-img" />
        <div class="contact-info">
          <div class="contact-name">OnTop <span class="business-icon" title="Business account" aria-label="Business account"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12"><path d="M9 4H3a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1zM4 5h4v2H4z"/></svg></span></div>
          <div class="contact-cashtag">$OnTop967</div>
        </div>
        <label aria-label="Select OnTop as recipient" class="contact-radio">
          <input type="radio" name="recipient" value="OnTop, $OnTop967" />
          <span class="checkmark"></span>
        </label>
      </div>
    </div>

    <div class="section-title">Contacts</div>
    <div class="contacts-list" role="list">
      <!-- Example contact for demonstration -->
      <div class="contact-item" role="listitem">
        <img src="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?crop=faces&fit=crop&w=42&h=42" alt="Contact example" class="contact-img" />
        <div class="contact-info">
          <div class="contact-name">Alice Smith</div>
          <div class="contact-cashtag">$AliceTheOne</div>
        </div>
        <label aria-label="Select Alice Smith as recipient" class="contact-radio">
          <input type="radio" name="recipient" value="Alice Smith, $AliceTheOne" />
          <span class="checkmark"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Receipt popup -->
  <div id="receipt" role="dialog" aria-modal="true" aria-labelledby="receiptTitle">
    <h2 id="receiptTitle">Payment Receipt</h2>
    <p><strong>Amount: </strong> <span id="receiptAmount"></span></p>
    <p><strong>To: </strong> <span id="receiptTo"></span></p>
    <p><strong>For: </strong> <span id="receiptFor"></span></p>
    <p><strong>Payment Method: </strong>Visa debit card 9172</p>
    <button class="close-receipt" id="closeReceiptBtn" aria-label="Close receipt">Close</button>
  </div>

  <script>
    const toInput = document.getElementById('toInput');
    const forInput = document.getElementById('forInput');
    const payBtn = document.getElementById('payBtn');
    const receipt = document.getElementById('receipt');
    const receiptAmount = document.getElementById('receiptAmount');
    const receiptTo = document.getElementById('receiptTo');
    const receiptFor = document.getElementById('receiptFor');
    const closeReceiptBtn = document.getElementById('closeReceiptBtn');
    const amountHeader = document.getElementById('amountHeader');
    const recipientRadios = document.querySelectorAll('input[name="recipient"]');
    const closeBtn = document.getElementById('closeBtn');

    // Enable pay button only if required fields are filled
    function validateInputs() {
      if (toInput.value.trim() !== '' && forInput.value.trim() !== '') {
        payBtn.disabled = false;
        payBtn.classList.add('enabled');
        payBtn.setAttribute('aria-disabled', 'false');
      } else {
        payBtn.disabled = true;
        payBtn.classList.remove('enabled');
        payBtn.setAttribute('aria-disabled', 'true');
      }
    }
    toInput.addEventListener('input', validateInputs);
    forInput.addEventListener('input', validateInputs);

    // User can choose suggested contacts by clicking the radio button - it populates the "To" input
    recipientRadios.forEach(radio => {
      radio.addEventListener('change', e => {
        toInput.value = e.target.value;
        validateInputs();
      });
    });

    // Pay button click
    payBtn.addEventListener('click', () => {
      if (payBtn.disabled) return;
      // Fill receipt info
      receiptAmount.textContent = amountHeader.textContent;
      receiptTo.textContent = toInput.value;
      receiptFor.textContent = forInput.value;
      receipt.style.display = 'block';
      receipt.focus();
    });

    // Close receipt popup
    closeReceiptBtn.addEventListener('click', () => {
      receipt.style.display = 'none';
    });

    // Close button on top (just clears inputs for demo)
    closeBtn.addEventListener('click', () => {
      toInput.value = '';
      forInput.value = '';
      recipientRadios.forEach(r => r.checked = false);
      validateInputs();
      receipt.style.display = 'none';
    });

    // Initially validate inputs to set pay button state
    validateInputs();
  </script>
</body>
</html>
