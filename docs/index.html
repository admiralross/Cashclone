<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Money Dashboard</title>
<style>
  /* Reset & base styles */
  * {
    box-sizing: border-box;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
      Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
    background: #f9f9f9;
    margin: 20px;
    color: #1e1e1e;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Container */
  .container {
    max-width: 400px;
    margin: 0 auto;
  }

  /* Top Bar with Money and Profile Circle */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .top-bar h2 {
    margin: 0;
    font-weight: 500;
  }

  .profile-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at center, #d6b0aa, #7e5858);
    border: 1.5px solid #ddd;
  }

  /* Cash Balance Card */
  .cash-balance-card {
    background: #fff;
    border-radius: 14px;
    padding: 22px 20px 26px 20px;
    margin-bottom: 20px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.1);
  }

  .cash-balance-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #999;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .cash-balance-amount {
    font-weight: 900;
    font-size: 32px;
    margin-bottom: 18px;
    line-height: 1;
  }

  .cash-balance-buttons {
    display: flex;
    gap: 20px;
  }

  .cash-balance-buttons button {
    flex: 1;
    padding: 12px 0;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    background: #f2f2f2;
    transition: background 0.2s ease;
  }

  .cash-balance-buttons button:hover {
    background: #e5e5e5;
  }

  /* Cards Section */
  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  .card {
    background: #fff;
    border-radius: 14px;
    padding: 14px 16px 24px 16px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.1);
    position: relative;
  }

  .card .icon-circle {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    margin-bottom: 6px;
  }

  /* Specific card icons colors */
  .icon-savings {
    background: #5dbdb5;
  }
  .icon-borrow {
    background: #85a9d1;
  }
  .icon-taxes {
    background: #6a4777;
  }
  .icon-paychecks {
    background: #3ec83e;
  }
  .icon-bitcoin {
    background: #67cacf;
  }
  .icon-stocks {
    background: #7b2ced;
  }

  /* Card Title */
  .card-title {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 4px;
  }

  /* Card Content Values */
  .card-value {
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 5px;
  }

  /* Card subtext */
  .card-subtext {
    font-weight: 400;
    font-size: 12px;
    color: #878787;
  }

  /* Additional styling for "Available" text with a small circle */
  .borrow-available {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 400;
    font-size: 14px;
    color: #878787;
  }

  .small-circle {
    width: 8px;
    height: 8px;
    background: #999;
    border-radius: 50%;
  }

  /* Bottom navigation bar icons container */
  .bottom-nav {
    display: flex;
    justify-content: space-around;
    margin-top: 40px;
  }

  .bottom-nav button {
    background: none;
    border: none;
    font-size: 24px;
    color: #c2c2c2;
    cursor: pointer;
    padding: 10px;
  }

  .bottom-nav button.active {
    color: #1e1e1e;
  }
</style>
</head>
<body>
  <div class="container">
    <!-- Top bar -->
    <div class="top-bar">
      <h2>Money</h2>
      <div class="profile-circle" title="Profile"></div>
    </div>

    <!-- Cash balance card -->
    <div class="cash-balance-card">
      <div class="cash-balance-header">
        <div>Cash balance</div>
        <div>Account &amp; routing</div>
      </div>
      <div class="cash-balance-amount">$525.90</div>
      <div class="cash-balance-buttons">
        <button id="addCashBtn">Add Cash</button>
        <button id="cashOutBtn">Cash Out</button>
      </div>
    </div>

    <!-- Cards section -->
    <div class="cards">
      <!-- Savings -->
      <div class="card">
        <div class="icon-circle icon-savings" aria-label="Savings Icon">💧</div>
        <div class="card-title">Savings</div>
        <div class="card-value">$0.00</div>
        <div class="card-subtext">Up to 4.5% interest</div>
      </div>

      <!-- Borrow -->
      <div class="card">
        <div class="icon-circle icon-borrow" aria-label="Borrow Icon">✈️</div>
        <div class="card-title">Borrow</div>
        <div class="card-value">$0.00</div>
        <div class="borrow-available">
          <div class="small-circle"></div>
          <div>Available</div>
        </div>
      </div>

      <!-- Taxes -->
      <div class="card">
        <div class="icon-circle icon-taxes" aria-label="Taxes Icon">🏛️</div>
        <div class="card-title">Taxes</div>
        <div class="card-subtext">Pay $0 to file</div>
      </div>

      <!-- Paychecks -->
      <div class="card">
        <div class="icon-circle icon-paychecks" aria-label="Paychecks Icon">⬇️</div>
        <div class="card-title">Paychecks</div>
        <div class="card-subtext">Get direct deposits early</div>
      </div>

      <!-- Bitcoin -->
      <div class="card">
        <div class="icon-circle icon-bitcoin" aria-label="Bitcoin Icon">₿</div>
        <div class="card-title">Bitcoin</div>
        <div class="card-value">$525</div>
      </div>

      <!-- Stocks -->
      <div class="card">
        <div class="icon-circle icon-stocks" aria-label="Stocks Icon">↗️</div>
        <div class="card-title">Stocks</div>
      </div>
    </div>

    <!-- Bottom navigation (replicated icons from the bottom of the image) -->
    <div class="bottom-nav" aria-label="Bottom navigation">
      <button aria-label="Home" id="page_1"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#c2c2c2" viewBox="0 0 24 24"><path d="M3 9.857L12 3l9 6.857V21a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.857z" /></svg></button>
      <button aria-label="Transaction" class="active"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#1e1e1e" viewBox="0 0 24 24"><path d="M8 21v-2H5.414l9.292-9.293-1.414-1.414L4 17.586V15H2v6h6zm12.707-11.707a.996.996 0 00-1.414 0l-9.586 9.586 1.414 1.414 9.586-9.586a.996.996 0 000-1.414z"/></svg></button>
      <button aria-label="Search"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#c2c2c2" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16a6.471 6.471 0 004.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM10 14a4 4 0 110-8 4 4 0 010 8z"/></svg></button>
      <button aria-label="Notifications" id="page_2" ><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#c2c2c2" viewBox="0 0 24 24"><path d="M12 22a2 2 0 002-2H10a2 2 0 002 2zm6-6v-5a6 6 0 00-5-5.917V4a1 1 0 00-2 0v1.083A6 6 0 006 11v5l-2 2v1h16v-1l-2-2z"/></svg></button>
    </div>
  </div>

  <script>
    // JavaScript to handle Add Cash and Cash Out button clicks
    document.getElementById('addCashBtn').addEventListener('click', function() {
      alert('Add Cash clicked!');
      
    });
    document.getElementById("page_1").onclick = function(){
    window.location.href = "page1.html";
    });

    document.getElementById("page_2").onclick = function(){
    window.location.href = "page2.html";
    });
    

    document.getElementById('cashOutBtn').addEventListener('click', function() {
      alert('Cash Out clicked!');
    });
  </script>
</body>
</html>
